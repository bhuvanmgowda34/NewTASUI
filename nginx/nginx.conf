events {}

http {

	resolver 127.0.0.11 valid=30s;
	
    # HTTP Server
    server {

        listen 80;

        server_name bhuone.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server
    server {

        listen 443 ssl;

        server_name bhuone.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/bhuone.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bhuone.duckdns.org/privkey.pem;

        location / {

            set $backend http://newtasui:8080;
			proxy_pass $backend;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}